# Fault-Proof Software KVM Configuration File
# This file defines server settings and computer configurations

[server]
# Server host and port
host = 0.0.0.0
port = 8765

# SSL/TLS settings (optional)
# ssl_cert = /path/to/cert.pem
# ssl_key = /path/to/key.pem

# Edge detection threshold (pixels)
edge_threshold = 50.0

# Example computer definitions (optional - can be auto-detected)
# [computer:main]
# computer_id = main-pc
# is_main = true
# monitors = default:1920x1080

# [computer:player1]
# computer_id = player-pc-1
# is_main = false
# monitors = default:1920x1080

# Note: In practice, computers register dynamically with the server.
# This file is mainly for server configuration.
# Monitor configuration (auto-detected if not specified)
# Format: monitor_id,x,y,width,height
# Actual resolution: 2560x1440 (detected via xrandr)
monitors = m0,0,0,2560,1440

# Example with dual monitors (side by side):
# monitors =
#     m0,0,0,1920,1080
#     m1,1920,0,1920,1080

# Example with vertical stacking:
# monitors =
#     m0,0,0,1920,1080
#     m1,0,1080,1920,1080


[computer.goldenthinker]
# A player computer (receives input)
role = player

# Monitor configuration (auto-detected if not specified)
monitors = m0,0,0,1920,1080


# Add more computers as needed:
# [computer.workstation1]
# role = player
# monitors = m0,0,0,2560,1440
#
# [computer.workstation2]
# role = player
# monitors =
#     m0,0,0,1920,1080
#     m1,1920,0,1920,1080


# ============================================================================
# Monitor Edge Links
# ============================================================================
# Defines which monitor edges connect to each other
# Format: computer.monitor.edge = target_computer.target_monitor.target_edge
#
# Edges: left, right, top, bottom
#
# Example: Moving mouse off the RIGHT edge of minipc's m0
#          enters the LEFT edge of goldenthinker's m0
# ============================================================================

[monitor_links]
# minipc right edge connects to goldenthinker left edge
minipc.m0.right = goldenthinker.m0.left

# goldenthinker left edge connects back to minipc right edge
goldenthinker.m0.left = minipc.m0.right

# Example with more complex setup:
# minipc right edge to laptop1 left edge
# minipc.m0.right = laptop1.m0.left
# laptop1.m0.left = minipc.m0.right
#
# laptop1 right edge to laptop2 left edge
# laptop1.m0.right = laptop2.m0.left
# laptop2.m0.left = laptop1.m0.right
#
# Vertical connections:
# minipc top edge to ceiling_monitor bottom edge
# minipc.m0.top = ceiling_monitor.m0.bottom
# ceiling_monitor.m0.bottom = minipc.m0.top


# ============================================================================
# Auto-Detection Settings
# ============================================================================

[detection]
# Auto-detect monitors if not explicitly configured
auto_detect_monitors = true

# Preferred detection method: xrandr | tkinter | default
# - xrandr: Best for Linux (requires xrandr command)
# - tkinter: Cross-platform (requires tkinter)
# - default: Fallback to 1920x1080
preferred_detection = xrandr


# ============================================================================
# Behavior Settings
# ============================================================================

[behavior]
# Edge detection threshold (pixels from edge to trigger crossing)
# Set to 1 for "sharp" edges - must actually touch the edge to cross
edge_threshold = 1

# Edge offset when mapping cursor (pixels inside target monitor)
# Larger offset = cursor starts further from edge, preventing rapid back-and-forth
edge_offset = 100

# Hide cursor on inactive computers (requires unclutter on Linux)
hide_cursor_when_inactive = true
